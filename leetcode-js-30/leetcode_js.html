    <script>
      // ----- 14 -----

      var cancellable = function (fn, args, t) {
        // Step 1: schedule fn to run after `t` ms
        const timeoutId = setTimeout(() => {
          fn(...args); // Call fn with the provided arguments
        }, t);

        // Step 2: return a function that can cancel the scheduled call
        return function cancelFn() {
          clearTimeout(timeoutId); // This cancels the above timer
        };
      };

      const cancelTimeMs = 50;
      const cancelFn = cancellable((x) => console.log(x * 5), [2], 20);
      setTimeout(cancelFn, cancelTimeMs);
      // // Output: 10 (at 20ms) ✅ because cancel came too late

      // const cancelTimeMs = 50;
